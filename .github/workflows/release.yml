name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Package frontend assets for delta update
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          Compress-Archive -Path src/* -DestinationPath "assets-$version.zip" -Force
          $size = (Get-Item "assets-$version.zip").Length
          $json = @{
            version = $version
            url = "https://github.com/${{ github.repository }}/releases/download/v$version/assets-$version.zip"
            size = $size
            notes = "Frontend update v$version"
          } | ConvertTo-Json
          Set-Content -Path assets-manifest.json -Value $json
        shell: pwsh

      - name: Commit updated assets-manifest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets-manifest.json
          git commit -m "chore: update assets manifest for ${{ github.ref_name }}" || echo "Nothing to commit"
          git pull origin master --rebase || echo "Pull rebase skipped"
          git push origin HEAD:master || echo "Push failed, continuing"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Main App
        run: |
          cd src-tauri
          cargo build --release
        shell: pwsh

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/voicetype.exe
            assets-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
