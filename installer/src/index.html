<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceType Installer</title>
    <style>
        :root {
            --bg-primary: #080c08;
            --bg-elevated: #141a14;
            --accent-green: #39ff50;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --border-subtle: rgba(255, 255, 255, 0.07);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .titlebar {
            height: 40px;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            -webkit-app-region: drag;
            border-bottom: 1px solid var(--border-subtle);
        }
        .titlebar-title {
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 14px;
        }
        .titlebar-close {
            -webkit-app-region: no-drag;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
        }
        .titlebar-close:hover {
            color: #ff3b3b;
        }
        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            text-align: center;
        }
        .logo span {
            color: var(--accent-green);
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .path-container {
            display: flex;
            gap: 10px;
        }
        .path-input {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .browse-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 0 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .browse-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }
        .checkbox-group label {
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: var(--accent-green);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .install-btn {
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(57, 255, 80, 0.3);
            transition: all 0.2s;
        }
        .install-btn:hover {
            box-shadow: 0 0 25px rgba(57, 255, 80, 0.5);
            transform: translateY(-1px);
        }
        .install-btn:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .progress-container {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
        }
        .finish-container {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-elevated);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            transition: width 0.3s ease;
        }
        .progress-text {
            color: var(--text-secondary);
            font-size: 13px;
        }
        .bottom-right-bar {
            position: absolute;
            bottom: 20px;
            right: 25px;
        }
        .close-btn-bottom {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn-bottom:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-title">VoiceType Setup</div>
        <button class="titlebar-close" id="close-btn">✕</button>
    </div>
    
    <!-- SETUP VIEW -->
    <div class="content" id="setup-view">
        <div class="logo">Voice<span>Type</span></div>
        <div class="subtitle">Next-generation voice dictation.</div>
        
        <div class="input-group">
            <span class="input-label">Installation Path</span>
            <div class="path-container">
                <input type="text" class="path-input" id="install-path" readonly>
                <button class="browse-btn" id="browse-btn">Browse</button>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="shortcut-desktop" checked>
            <label for="shortcut-desktop">Create Desktop Shortcut</label>
        </div>

        <button class="install-btn" id="install-btn">INSTALL</button>
    </div>

    <!-- PROGRESS VIEW -->
    <div class="content progress-container" id="progress-view">
        <div class="logo">Voice<span>Type</span></div>
        <div class="subtitle" id="status-text">Installing...</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-percent">0%</div>
    </div>

    <!-- FINISH VIEW -->
    <div class="content finish-container" id="finish-view">
        <div class="logo">Voice<span>Type</span></div>
        <div class="subtitle" style="color: var(--accent-green); font-weight: 600;">Installation Completed Successfully!</div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="finish-autostart" checked>
            <label for="finish-autostart">Add to Windows Autostart</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="finish-startmenu" checked>
            <label for="finish-startmenu">Add to Start Menu</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="finish-launch" checked>
            <label for="finish-launch">Launch VoiceType</label>
        </div>

        <div class="bottom-right-bar">
            <button class="close-btn-bottom" id="finish-close-btn">Close</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
